    summary: >-
      No official, self-service public developer portal or open-data API program was
      found for Tel Aviv University. Confirmed live surfaces are third-party platform
      standards: an ExLibris Primo discovery interface (institution code
      972TAU_INST:TAU, branded "DaTA Search") backed by an Alma platform that supports
      the standard Primo Search REST API and Alma OAI-PMH harvesting — both requiring
      institution-provisioned ExLibris keys, not TAU-published docs. The only
      programmatic "TAU API" surface is unofficial student tooling (Arazim Project's
      tau-tools) that wraps Moodle/IMS/course data. All cataloged endpoints were probed
      live; no TAU-specific endpoints were fabricated. Rated 2 (low public API
      maturity: gated/platform-standard only).
